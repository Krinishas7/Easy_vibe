{% extends 'base.html' %}

{% block title %}Page Not Found - EventBook{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="error-page">
                <h1 class="display-1 text-primary">404</h1>
                <h2 class="mb-4">Page Not Found</h2>
                <p class="lead text-muted mb-4">
                    Sorry, the page you are looking for doesn't exist or has been moved.
                </p>
                <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                    <a href="{% url 'events:home' %}" class="btn btn-primary me-md-2">
                        <i class="fas fa-home me-2"></i>Go Home
                    </a>
                    <a href="{% url 'events:event_list' %}" class="btn btn-outline-primary">
                        <i class="fas fa-calendar-alt me-2"></i>Browse Events
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

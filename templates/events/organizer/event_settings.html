{% extends "base.html" %}

{% block title %}Settings — {{ event.title }}{% endblock %}

{% block content %}
<div class="container py-4">

    <h2 class="mb-4">Edit Event: {{ event.title }}</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'events:organizer_event_manage' event.id %}" class="btn btn-secondary">Back</a>
    </form>

</div>
{% endblock %}
